version: '3.8'

services:
  mikudrome:
    build:
      context: .
      args:
        # API_BASE_URL: 前端 API 地址。空 = 同源（相对路径，生产推荐）
        API_BASE_URL: ${API_BASE_URL:-}
    container_name: mikudrome
    ports:
      - "8080:8080"
    volumes:
      - ./media:/app/media          # 媒体文件目录
      - ./data:/app/data            # 数据库目录
    environment:
      - MEDIA_ROOT=/app/media
      - DB_PATH=/app/data/mikudrome.db
      - HTTP_ADDR=:8080
      - WEB_ROOT=/app/build/web
      - TZ=Asia/Shanghai
      - YTDLP_PROXY=  # 例如: http://host.docker.internal:7890 或 socks5://127.0.0.1:1080
      - ENABLE_WATCHER=true  # 启用文件监控，自动检测媒体文件变化
    restart: unless-stopped
